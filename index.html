<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MediaHub Player</title>

<style>
body{
  margin:0;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
  font-family:Arial;
}

h1{
  margin-bottom:15px;
  font-size:20px;
  font-weight:normal;
}

video{
  width:480px;
  height:270px;
  background:black;
}

.controls{
  margin-top:15px;
  display:flex;
  gap:10px;
}

button{
  width:120px;
  height:45px;
  font-size:16px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
</style>

</head>

<body>

<h1>testo che puoi modificare</h1>

<video id="vid" autoplay playsinline poster="annamo_bene-ezgif.com-resize-video.jpg">
  <source src="annamo_bene-ezgif.com-resize-video.mp4" type="video/mp4">
</video>

<div class="controls">
  <button onclick="playVideo()">Play</button>
  <button onclick="pauseVideo()">Pausa</button>
  <button onclick="stopVideo()">Stop</button>
</div>

<script>
const v = document.getElementById("vid");

function playVideo(){
  v.play();
}

function pauseVideo(){
  v.pause();
}

function stopVideo(){
  v.pause();
  v.currentTime = 0;
}
</script>

</body>
</html>
